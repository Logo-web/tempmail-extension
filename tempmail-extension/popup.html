<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>TempMail AutoFill</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M22 4L12 13L2 4"/>
        </svg>
      </div>
      <h1>TempMail AutoFill</h1>
      <button id="settings-btn" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </header>

    <!-- Email Section -->
    <section class="email-section">
      <div id="email-status" class="email-status">
        <div class="status-dot loading"></div>
        <span>Loading...</span>
      </div>

      <div id="email-display" class="email-display hidden">
        <div class="email-field">
          <label>Email Address</label>
          <div class="field-row">
            <input type="text" id="email-address" readonly>
            <button id="copy-email" class="copy-btn" title="Copy email">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="email-field">
          <label>Generated Password</label>
          <div class="field-row">
            <input type="password" id="email-password" readonly>
            <button id="toggle-password" class="toggle-btn" title="Show/hide password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
            <button id="copy-password" class="copy-btn" title="Copy password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Actions -->
    <section class="actions-section">
      <select id="email-type" class="email-type-select">
        <option value="other">Temp Mail (Free)</option>
        <option value="google">Gmail (Free)</option>
        <option value="microsoft">Outlook (Free)</option>
      </select>
    </section>
    <section class="actions-section">
      <button id="create-email" class="action-btn primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Email
      </button>
      <button id="refresh-inbox" class="action-btn secondary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
        </svg>
        Refresh Inbox
      </button>
    </section>

    <!-- Inbox Section -->
    <section class="inbox-section">
      <div class="inbox-header">
        <h2>Inbox</h2>
        <span id="inbox-count" class="inbox-count">0 messages</span>
      </div>
      <div id="inbox-list" class="inbox-list">
        <div class="inbox-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M22 4L12 13L2 4"/>
          </svg>
          <p>No messages yet</p>
        </div>
      </div>
    </section>

    <!-- Latest OTP -->
    <section id="otp-section" class="otp-section hidden">
      <div class="otp-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <span>Latest Verification Code</span>
      </div>
      <div class="otp-display">
        <span id="otp-code" class="otp-code"></span>
        <button id="copy-otp" class="copy-btn" title="Copy OTP">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
      <div id="otp-from" class="otp-from"></div>
    </section>

    <!-- Footer -->
    <footer class="popup-footer">
      <span>Powered by SmailPro</span>
      <span id="version" class="version">v1.0.0</span>
    </footer>
  </div>

  <!-- Message Detail Modal -->
  <div id="message-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-subject"></h3>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-meta">
        <span id="modal-from"></span>
        <span id="modal-date"></span>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
