              - generic [ref=e2305]:
                - button "What is Firecrawl?" [ref=e2306] [cursor=pointer]:
                  - generic [ref=e2307]: What is Firecrawl?
                  - img [ref=e2309]
                - generic [ref=e2312]: Firecrawl turns entire websites into clean, LLM-ready markdown or structured data. Scrape, crawl and extract the web with a single API. Ideal for AI companies looking to empower their LLM applications with web data
              - generic [ref=e2314]:
                - button "What sites work?" [ref=e2315] [cursor=pointer]:
                  - generic [ref=e2316]: What sites work?
                  - img [ref=e2318]
                - generic [ref=e2321]: Firecrawl is best suited for business websites, docs and help centers. We currently don't support social media platforms.
              - generic [ref=e2323]:
                - button "Who can benefit from using Firecrawl?" [ref=e2324] [cursor=pointer]:
                  - generic [ref=e2325]: Who can benefit from using Firecrawl?
                  - img [ref=e2327]
                - generic [ref=e2330]: Firecrawl is tailored for LLM engineers, data scientists, AI researchers, and developers looking to harness web data for training machine learning models, market research, content aggregation, and more. It simplifies the data preparation process, allowing professionals to focus on insights and model development.
              - generic [ref=e2332]:
                - button "Is Firecrawl open-source?" [ref=e2333] [cursor=pointer]:
                  - generic [ref=e2334]: Is Firecrawl open-source?
                  - img [ref=e2336]
                - generic [ref=e2339]: Yes, it is. You can check out the repository on GitHub. Keep in mind that this repository is currently in its early stages of development. We are in the process of merging custom modules into this mono repository.
              - generic [ref=e2341]:
                - button "What is the difference between Firecrawl and other web scrapers?" [ref=e2342] [cursor=pointer]:
                  - generic [ref=e2343]: What is the difference between Firecrawl and other web scrapers?
                  - img [ref=e2345]
                - generic [ref=e2348]: Firecrawl is designed with reliability and AI-ready data in mind. We focus on delivering data reliably and in a LLM-ready format - so you can spend less tokens and build better AI applications.
              - generic [ref=e2350]:
                - button "What is the difference between the open-source version and the hosted version?" [ref=e2351] [cursor=pointer]:
                  - generic [ref=e2352]: What is the difference between the open-source version and the hosted version?
                  - img [ref=e2354]
                - generic [ref=e2357]: Firecrawl's hosted version features Fire-engine which is our proprietary scraper that takes care of proxies, anti-bot mechanisms and more. It is an intelligent scraper designed to get the data you need - reliably. The hosted version also allows for actions (interacting with the page before scraping), a dashboard for analytics, and it is 1 API call away.
