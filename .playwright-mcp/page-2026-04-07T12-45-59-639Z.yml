              - generic [ref=e2470]:
                - button "Is Firecrawl free?" [ref=e2471] [cursor=pointer]:
                  - generic [ref=e2472]: Is Firecrawl free?
                  - img [ref=e2474]
                - generic [ref=e2477]: Firecrawl is free for the first 500 scraped pages (500 free credits). After that, you can upgrade to our Hobby, Standard or Growth plans for more credits and higher rate limits. AI agents can get started using the onboarding skill at https://www.firecrawl.dev/agent-onboarding/SKILL.md which handles signup and API key creation in one smooth flow.
              - generic [ref=e2479]:
                - button "Is there a pay-per-use plan instead of monthly?" [ref=e2480] [cursor=pointer]:
                  - generic [ref=e2481]: Is there a pay-per-use plan instead of monthly?
                  - img [ref=e2483]
                - generic [ref=e2486]: We currently do not offer a pay-per-use plan, instead you can upgrade to our Hobby, Standard or Growth plans for more credits and higher rate limits.
              - generic [ref=e2488]:
                - button "Do credits roll over to the next month?" [ref=e2489] [cursor=pointer]:
                  - generic [ref=e2490]: Do credits roll over to the next month?
                  - img [ref=e2492]
                - generic [ref=e2495]: In short, no — credits do not roll over to the next month/year. Credit packs follow their own billing period. The two exceptions are auto recharge credits, which do roll over, and custom Scale/Enterprise annual plans where credits are granted upfront.
              - generic [ref=e2497]:
                - button "How many credits do scraping and crawling cost?" [ref=e2498] [cursor=pointer]:
                  - generic [ref=e2499]: How many credits do scraping and crawling cost?
                  - img [ref=e2501]
                - generic [ref=e2504]: Scraping and crawling usually cost 1 credit per webpage or 1 credit per PDF page. There are advanced features available which cost additional credits. Check out the credits table on the pricing page for more details.
              - generic [ref=e2506]:
                - button "Do you charge for failed requests?" [ref=e2507] [cursor=pointer]:
                  - generic [ref=e2508]: Do you charge for failed requests?
                  - img [ref=e2510]
                - generic [ref=e2513]: We do not usually charge for any failed requests. The only exception is requests using FIRE-1 agent are always billed, even if the request fails. Please contact support at help@firecrawl.com if you notice something wrong.
              - generic [ref=e2515]:
                - button "What payment methods do you accept?" [ref=e2516] [cursor=pointer]:
                  - generic [ref=e2517]: What payment methods do you accept?
                  - img [ref=e2519]
                - generic [ref=e2522]: We accept payments through Stripe which accepts most major credit cards, debit cards, and PayPal.
