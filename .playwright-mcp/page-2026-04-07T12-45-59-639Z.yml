                  - generic [ref=e2377]: Why is it not crawling all the pages?
                  - img [ref=e2379]
                - generic [ref=e2382]: There are a few reasons why Firecrawl may not be able to crawl all the pages of a website. Some common reasons include rate limiting, and anti-scraping mechanisms, disallowing the crawler from accessing certain pages. If you're experiencing issues with the crawler, please reach out to our support team at help@firecrawl.com.
              - generic [ref=e2384]:
                - button "Can Firecrawl crawl websites without a sitemap?" [ref=e2385] [cursor=pointer]:
                  - generic [ref=e2386]: Can Firecrawl crawl websites without a sitemap?
                  - img [ref=e2388]
                - generic [ref=e2391]: Yes, Firecrawl can access and crawl all accessible subpages of a website, even in the absence of a sitemap. This feature enables users to gather data from a wide array of web sources with minimal setup.
              - generic [ref=e2393]:
                - button "What formats can Firecrawl convert web data into?" [ref=e2394] [cursor=pointer]:
                  - generic [ref=e2395]: What formats can Firecrawl convert web data into?
                  - img [ref=e2397]
                - generic [ref=e2400]: Firecrawl specializes in converting web data into clean, well-formatted markdown. This format is particularly suited for LLM applications, offering a structured yet flexible way to represent web content.
              - generic [ref=e2402]:
                - button "How does Firecrawl ensure the cleanliness of the data?" [ref=e2403] [cursor=pointer]:
                  - generic [ref=e2404]: How does Firecrawl ensure the cleanliness of the data?
                  - img [ref=e2406]
                - generic [ref=e2409]: Firecrawl employs advanced algorithms to clean and structure the scraped data, removing unnecessary elements and formatting the content into readable markdown. This process ensures that the data is ready for use in LLM applications without further preprocessing.
              - generic [ref=e2411]:
                - button "Is Firecrawl suitable for large-scale data scraping projects?" [ref=e2412] [cursor=pointer]:
                  - generic [ref=e2413]: Is Firecrawl suitable for large-scale data scraping projects?
                  - img [ref=e2415]
                - generic [ref=e2418]: Absolutely. Firecrawl offers various pricing plans, including a Scale plan that supports scraping of millions of pages. With features like caching and scheduled syncs, it's designed to efficiently handle large-scale data scraping and continuous updates, making it ideal for enterprises and large projects.
              - generic [ref=e2420]:
                - button "Does it respect robots.txt?" [ref=e2421] [cursor=pointer]:
                  - generic [ref=e2422]: Does it respect robots.txt?
                  - img [ref=e2424]
                - generic [ref=e2427]: Yes, Firecrawl's crawl endpoint respects the rules set in a website's robots.txt file. If you notice any issues with the way Firecrawl interacts with your website, you can adjust the robots.txt file to control the crawler's behavior. Firecrawl respects rules set for the 'FirecrawlAgent' directive in robots.txt. If you notice any behavior that is not expected, please let us know at help@firecrawl.com.
              - generic [ref=e2429]:
                - button "What measures does Firecrawl take to handle web scraping challenges like rate limits and caching?" [ref=e2430] [cursor=pointer]:
                  - generic [ref=e2431]: What measures does Firecrawl take to handle web scraping challenges like rate limits and caching?
                  - img [ref=e2433]
                - generic [ref=e2436]: Firecrawl is built to navigate common web scraping challenges, including stealth proxies, rate limits, and smart wait. It smartly manages requests and employs techniques to minimize bandwidth usage and avoid triggering anti-scraping mechanisms, ensuring reliable data collection.
              - generic [ref=e2438]:
                - button "Does Firecrawl handle complex websites?" [ref=e2439] [cursor=pointer]:
                  - generic [ref=e2440]: Does Firecrawl handle complex websites?
                  - img [ref=e2442]
                - generic [ref=e2445]: Firecrawl uses optimized infrastructure including proxy management and smart request handling to reliably collect data from complex websites. You can also pass custom headers to the API for additional flexibility.
